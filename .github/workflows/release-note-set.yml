name: Release Daily Note Set

on:
  schedule:
    # GitHub cron uses UTC. 04:00 UTC = 06:00 in UTC+2.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-note-set:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Release one hidden note set
        run: python scripts/release_next_note.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No note set released. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .hidden-notes notes
          git commit -m "Release daily note set"
          git push
